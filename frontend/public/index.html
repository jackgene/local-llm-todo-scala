<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    .app { display: flex; flex-direction: column; gap: 1rem; }
    .todo-input { padding: 0.5rem; font-size: 1rem; flex: 1; }
    .add-btn { padding: 0.5rem 1rem; cursor: pointer; }
    .todo-list { list-style: none; padding: 0; }
    .todo-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; border-bottom: 1px solid #eee; }
    .todo-item.completed span { text-decoration: line-through; opacity: 0.5; }
    .delete-btn { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="todo-frontend/fastopt/bundle.js"></script>
</body>
</html>
